name: Lambda ウォームアップ

# 定期的に CloudFront 経由で /api/health を叩き、Lambda をアイドルにさせない。
# これによりユーザーアクセス時のコールドスタート（約1秒）を回避し、
# 常にウォーム状態（約0.3〜0.6秒）で応答できるようにする。
#
# 経路: GitHub Actions → CloudFront (/api/health, キャッシュ無効) → API Gateway
#       → エイリアス live → Lambda（DB接続も軽く確認して温める）
#
# コスト: 5分間隔で月約8,640回。Lambda無料枠（月100万リクエスト）の1%未満で無料枠内。

on:
  # 手動実行も可能にしておく（動作確認用）
  workflow_dispatch:
  schedule:
    # 5分ごとに実行（GitHub Actions cron の最短間隔。Lambda のアイドル回収
    # （5〜15分の幅がある）より早く叩き続けることで、ウォーム維持をより確実にする）
    - cron: "*/5 * * * *"

jobs:
  warmup:
    runs-on: ubuntu-latest
    steps:
      - name: /api/health を叩いて Lambda を温める
        run: |
          echo "ウォームアップ実行: $(date -u)"
          # -sS: 進捗は消すがエラーは表示  -m 30: 最大30秒でタイムアウト
          # -w: HTTPステータスと所要時間を表示
          curl -sS -m 30 \
            -w "\nHTTP status: %{http_code}  所要時間: %{time_total}s\n" \
            "https://dre5onrtbrgty.cloudfront.net/api/health"
