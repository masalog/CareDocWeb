<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CareDocWeb - 管理画面</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>CareDocWeb 管理画面</h1>
        <p>利用者データ・共通設定の管理</p>
    </header>

    <nav>
        <button class="nav-btn active" onclick="showSection('members', this)">利用者管理</button>
        <button class="nav-btn" onclick="showSection('settings', this)">共通設定</button>
    </nav>

    <main>
        <!-- 利用者管理セクション -->
        <section id="section-members" class="section">
            <h2>利用者一覧</h2>
            <button class="btn btn-success" onclick="showMemberForm()">＋ 新規登録</button>
            <div id="member-list"></div>

            <!-- 利用者登録・編集フォーム -->
            <div id="member-form-container" class="hidden">
                <h3 id="member-form-title">利用者登録</h3>
                <form id="member-form">
                    <input type="hidden" id="member-id" name="id">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="m-insurance">被保険者番号</label>
                            <input type="text" id="m-insurance" name="insuranceIdNumber">
                        </div>
                        <div class="form-group">
                            <label for="m-name">氏名 *</label>
                            <input type="text" id="m-name" name="name" required>
                        </div>
                        <div class="form-group">
                            <label for="m-furigana">フリガナ</label>
                            <input type="text" id="m-furigana" name="furigana">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="m-birth-year">生年（西暦）</label>
                            <input type="number" id="m-birth-year" name="birthYear">
                        </div>
                        <div class="form-group">
                            <label for="m-birth-month">生月</label>
                            <input type="number" id="m-birth-month" name="birthMonth" min="1" max="12">
                        </div>
                        <div class="form-group">
                            <label for="m-birth-day">生日</label>
                            <input type="number" id="m-birth-day" name="birthDay" min="1" max="31">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="m-gender">性別</label>
                            <select id="m-gender" name="gender">
                                <option value="">--</option>
                                <option value="男">男</option>
                                <option value="女">女</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="m-care-level">介護度</label>
                            <select id="m-care-level" name="careLevel">
                                <option value="">--</option>
                                <option value="要支援1">要支援1</option>
                                <option value="要支援2">要支援2</option>
                                <option value="要介護1">要介護1</option>
                                <option value="要介護2">要介護2</option>
                                <option value="要介護3">要介護3</option>
                                <option value="要介護4">要介護4</option>
                                <option value="要介護5">要介護5</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="m-address">住所</label>
                            <input type="text" id="m-address" name="address">
                        </div>
                        <div class="form-group">
                            <label for="m-phone">電話番号</label>
                            <input type="text" id="m-phone" name="phone">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="m-start-year">認定開始年</label>
                            <input type="number" id="m-start-year" name="startYear">
                        </div>
                        <div class="form-group">
                            <label for="m-start-month">開始月</label>
                            <input type="number" id="m-start-month" name="startMonth" min="1" max="12">
                        </div>
                        <div class="form-group">
                            <label for="m-start-day">開始日</label>
                            <input type="number" id="m-start-day" name="startDay" min="1" max="31">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="m-end-year">認定終了年</label>
                            <input type="number" id="m-end-year" name="endYear">
                        </div>
                        <div class="form-group">
                            <label for="m-end-month">終了月</label>
                            <input type="number" id="m-end-month" name="endMonth" min="1" max="12">
                        </div>
                        <div class="form-group">
                            <label for="m-end-day">終了日</label>
                            <input type="number" id="m-end-day" name="endDay" min="1" max="31">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="m-inst-year">施設入所年</label>
                            <input type="number" id="m-inst-year" name="institutionYear">
                        </div>
                        <div class="form-group">
                            <label for="m-inst-month">入所月</label>
                            <input type="number" id="m-inst-month" name="institutionMonth" min="1" max="12">
                        </div>
                        <div class="form-group">
                            <label for="m-inst-day">入所日</label>
                            <input type="number" id="m-inst-day" name="institutionDay" min="1" max="31">
                        </div>
                    </div>
                    <div class="form-actions">
                        <button type="button" class="btn btn-primary" onclick="saveMember()">保存</button>
                        <button type="button" class="btn btn-secondary" onclick="hideMemberForm()">キャンセル</button>
                    </div>
                </form>
            </div>
            <div id="member-message" class="message"></div>
        </section>

        <!-- 共通設定セクション -->
        <section id="section-settings" class="section hidden">
            <h2>共通設定（事業所情報）</h2>
            <form id="settings-form">
                <h3>調査連絡先</h3>
                <div class="form-row">
                    <div class="form-group">
                        <label for="s-survey-address">住所</label>
                        <input type="text" id="s-survey-address" name="surveyAddress">
                    </div>
                    <div class="form-group">
                        <label for="s-survey-phone">電話番号</label>
                        <input type="text" id="s-survey-phone" name="surveyPhone">
                    </div>
                </div>
                <h3>入所施設</h3>
                <div class="form-row">
                    <div class="form-group">
                        <label for="s-facility-name">施設名</label>
                        <input type="text" id="s-facility-name" name="facilityName">
                    </div>
                    <div class="form-group">
                        <label for="s-facility-phone">電話番号</label>
                        <input type="text" id="s-facility-phone" name="facilityPhone">
                    </div>
                </div>
                <h3>医療機関</h3>
                <div class="form-row">
                    <div class="form-group">
                        <label for="s-institution-name">医療機関名</label>
                        <input type="text" id="s-institution-name" name="institutionName">
                    </div>
                    <div class="form-group">
                        <label for="s-institution-address">住所</label>
                        <input type="text" id="s-institution-address" name="institutionAddress">
                    </div>
                </div>
                <h3>代理人</h3>
                <div class="form-row">
                    <div class="form-group">
                        <label for="s-agent-name">氏名</label>
                        <input type="text" id="s-agent-name" name="agentName">
                    </div>
                    <div class="form-group">
                        <label for="s-agent-postal">郵便番号</label>
                        <input type="text" id="s-agent-postal" name="agentPostal">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="s-agent-address">住所</label>
                        <input type="text" id="s-agent-address" name="agentAddress">
                    </div>
                    <div class="form-group">
                        <label for="s-agent-phone">電話番号</label>
                        <input type="text" id="s-agent-phone" name="agentPhone">
                    </div>
                </div>
                <h3>主治医・クリニック</h3>
                <div class="form-row">
                    <div class="form-group">
                        <label for="s-doctor-name">主治医名</label>
                        <input type="text" id="s-doctor-name" name="doctorName">
                    </div>
                    <div class="form-group">
                        <label for="s-clinic-name">クリニック名</label>
                        <input type="text" id="s-clinic-name" name="clinicName">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="s-clinic-postal">郵便番号</label>
                        <input type="text" id="s-clinic-postal" name="clinicPostal">
                    </div>
                    <div class="form-group">
                        <label for="s-clinic-address">住所</label>
                        <input type="text" id="s-clinic-address" name="clinicAddress">
                    </div>
                    <div class="form-group">
                        <label for="s-clinic-phone">電話番号</label>
                        <input type="text" id="s-clinic-phone" name="clinicPhone">
                    </div>
                </div>
                <button type="button" class="btn btn-primary" onclick="saveSettings()">設定を保存</button>
            </form>
            <div id="settings-message" class="message"></div>
        </section>
    </main>

    <script src="app.js"></script>
    <script>
        // 管理画面初期ロード
        document.addEventListener('DOMContentLoaded', () => {
            loadMembers();
        });
    </script>
</body>
</html>
